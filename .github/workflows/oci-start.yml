name: OCI start (retry until capacity)

# Rallume amd-vm quand un créneau de capacité Always Free se libère à Paris.
#
# SILENCIEUX & ROBUSTE : retente sur TOUT échec transitoire (manque de capacité,
# rate-limit/TooManyRequests, timeout réseau…) sans jamais faire échouer le job.
# Ouvre une issue (= mail) UNIQUEMENT au succès. Aucun mail d'échec.
#
# APPELS ESPACÉS : ~6 tentatives toutes les 90 s (au lieu de 12 × 30 s) pour ne
# pas saturer le quota d'appels du tenancy et laisser le grabber (ARM) respirer.
#
# À DÉSACTIVER une fois l'instance RUNNING (Actions > ce workflow > … > Disable).

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "OCID de l'instance à rallumer"
        required: true
        default: "ocid1.instance.oc1.eu-paris-1.anrwiljr4qgaapycfz6bk4rz5cpg7of7rlju6uzghyf2s3akxewp35pkmnqq"
  schedule:
    - cron: '*/10 * * * *'

permissions:
  issues: write

concurrency:
  group: oci-start
  cancel-in-progress: false

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
      DEFAULT_ID:          "ocid1.instance.oc1.eu-paris-1.anrwiljr4qgaapycfz6bk4rz5cpg7of7rlju6uzghyf2s3akxewp35pkmnqq"
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Start (retente sur tout échec transitoire, silencieux)
        run: |
          ID="${{ github.event.inputs.instance_id }}"
          [ -z "$ID" ] && ID="$DEFAULT_ID"
          echo "Instance : $ID"

          set +e
          STATE=$(oci compute instance get --instance-id "$ID" \
            --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
          echo "État initial : $STATE"
          if [ "$STATE" = "RUNNING" ]; then
            echo "Déjà RUNNING — rien à faire."
            exit 0
          fi

          # ~6 tentatives espacées de 90 s (~9 min). Le cron relance toutes les
          # 10 min. On retente sur TOUT échec (capacité, rate-limit, timeout).
          for i in $(seq 1 6); do
            OUT=$(oci compute instance action --instance-id "$ID" \
              --action START --wait-for-state RUNNING --max-wait-seconds 120 2>&1)
            if [ $? -eq 0 ]; then
              echo "✅ Instance RUNNING (tentative $i)."
              gh issue create --repo "$GITHUB_REPOSITORY" \
                --title "✅ amd-vm redémarrée (capacité retrouvée)" \
                --body "amd-vm est repassée en RUNNING. Récupère l'IP publique (elle a pu changer) dans la console OCI > Compute > Instances, puis DÉSACTIVE le workflow 'OCI start (retry until capacity)' (Actions > … > Disable) pour stopper les tentatives planifiées."
              exit 0
            fi
            REASON=$(echo "$OUT" | grep -oiE 'out of host capacity|toomanyrequests|timed out|timeout|connection|429|internalerror|throttl' | head -1)
            [ -z "$REASON" ] && REASON="échec transitoire"
            echo "Tentative $i : $REASON — nouvel essai dans 90 s…"
            sleep 90
          done
          echo "Pas rallumée cette fois — le prochain run planifié réessaiera. (silencieux)"
          exit 0
