name: OCI reboot migration

# Déplace une instance signalée en maintenance par Oracle vers du matériel sain.
#
# Contexte : Oracle a détecté que l'infrastructure sous-jacente de l'instance
# est instable (REF COMPUTE-10B, n° d49df561) et va la déplacer sous 24 h dans
# la fenêtre de maintenance. On peut prendre les devants.
#
# IMPORTANT : un simple reboot (SOFTRESET/RESET) redémarre l'instance SUR PLACE,
# donc sur le même serveur physique défaillant -> ça ne migre PAS et le flag
# "time-maintenance-reboot-due" reste présent. Pour vraiment déplacer l'instance,
# il faut un STOP complet (libère la machine physique) puis un START (Oracle la
# replace sur du matériel sain). C'est ce que fait ce workflow.
#
# Effets : coupure de ~1 à 3 min. Le disque (boot volume) et les données sont
# conservés. Une IP publique ÉPHÉMÈRE peut changer -> revérifier l'IP dans la
# console OCI après coup si besoin.
#
# Manuel uniquement (bouton "Run workflow").

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "OCID de l'instance à migrer (stop/start)"
        required: true
        default: "ocid1.instance.oc1.eu-paris-1.anrwiljr4qgaapycfz6bk4rz5cpg7of7rlju6uzghyf2s3akxewp35pkmnqq"

permissions:
  contents: read

concurrency:
  group: oci-reboot-migrate
  cancel-in-progress: false

jobs:
  reboot-migrate:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      INSTANCE_ID:         ${{ github.event.inputs.instance_id }}
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: État AVANT (nom / état / maintenance due)
        run: |
          set -e
          echo "Instance : $INSTANCE_ID"
          oci compute instance get --instance-id "$INSTANCE_ID" \
            --query 'data.{name:"display-name", state:"lifecycle-state", maintenanceRebootDue:"time-maintenance-reboot-due"}' \
            --output table

      - name: STOP (arrêt propre — libère le serveur physique)
        run: |
          set -e
          # SOFTSTOP = extinction propre de l'OS. --max-wait-seconds évite que le
          # job reste bloqué si l'arrêt gracieux traîne.
          oci compute instance action \
            --instance-id "$INSTANCE_ID" \
            --action SOFTSTOP \
            --wait-for-state STOPPED \
            --max-wait-seconds 300

      - name: START (redémarrage sur matériel sain)
        run: |
          set -e
          oci compute instance action \
            --instance-id "$INSTANCE_ID" \
            --action START \
            --wait-for-state RUNNING \
            --max-wait-seconds 300

      - name: État APRÈS (le flag maintenance doit avoir disparu)
        run: |
          set -e
          oci compute instance get --instance-id "$INSTANCE_ID" \
            --query 'data.{name:"display-name", state:"lifecycle-state", maintenanceRebootDue:"time-maintenance-reboot-due"}' \
            --output table
          echo "✅ Si 'maintenanceRebootDue' est vide/null ci-dessus, la migration a réussi."
          echo "ℹ️  Pense à revérifier l'IP publique dans la console OCI (une IP éphémère peut changer)."
