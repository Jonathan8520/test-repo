name: OCI capacity grabber

# Tente de créer une instance Always Free (AMD puis ARM) toutes les ~11 min.
# Dès qu'une slot se libère, l'instance est créée et une issue GitHub est
# ouverte (= tu reçois un mail). Pense à désactiver le workflow ensuite.

on:
  schedule:
    - cron: '*/11 * * * *'   # GitHub peut retarder/grouper : sans importance ici
  workflow_dispatch:          # bouton "Run workflow" pour tester à la main

permissions:
  issues: write

concurrency:
  group: oci-grabber
  cancel-in-progress: false

jobs:
  grab:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      COMPARTMENT:         ${{ secrets.OCI_COMPARTMENT }}
      SUBNET:              ${{ secrets.OCI_SUBNET }}
      SSH_PUBKEY:          ${{ secrets.OCI_SSH_PUBKEY }}
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Try to grab an instance
        run: |
          set +e
          AD=$(oci iam availability-domain list --query "data[0].name" --raw-output)
          echo "AD: $AD"

          # ARM déjà créée ? alors objectif atteint, on ne fait rien.
          # (L'amd-vm déjà obtenue est un quota Always Free séparé : on n'y touche plus.)
          EXISTING=$(oci compute instance list -c "$COMPARTMENT" --all \
            --query "data[?\"lifecycle-state\"!='TERMINATED' && \"lifecycle-state\"!='TERMINATING'].\"display-name\"" \
            --raw-output 2>/dev/null)
          if echo "$EXISTING" | grep -q 'arm-vm'; then
            echo "ARM déjà présente -> objectif atteint, rien à faire."
            exit 0
          fi

          IMG_ARM=$(oci compute image list -c "$COMPARTMENT" \
            --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED \
            --query "data[0].id" --raw-output)

          # --- Essai ARM (A1.Flex : 2 OCPU / 12 GB = le MAX gratuit en 24/7).
          #     Le free tier A1 est mesuré en heures : 1500 OCPU-h + 9000 GB-h / mois,
          #     soit ~2 OCPU / 12 GB allumés non-stop. Une VM 4/24 tournant 24/7
          #     dépasserait ces heures et serait FACTURÉE. ---
          OUT=$(oci compute instance launch \
            --availability-domain "$AD" --compartment-id "$COMPARTMENT" \
            --shape "VM.Standard.A1.Flex" --shape-config '{"ocpus": 2, "memoryInGBs": 12}' \
            --image-id "$IMG_ARM" --subnet-id "$SUBNET" --assign-public-ip true \
            --display-name "arm-vm" \
            --metadata "{\"ssh_authorized_keys\": \"$SSH_PUBKEY\"}" 2>&1)
          if echo "$OUT" | grep -q '"id"'; then
            echo "WHICH=ARM" >> "$GITHUB_ENV"; echo "GOT=1" >> "$GITHUB_ENV"
            echo "✅ ARM créée"; exit 0
          fi
          echo "ARM -> $(echo "$OUT" | grep -oiE 'out of host capacity|toomanyrequests|limitexceeded' | head -1)"

      - name: Notify on success
        if: env.GOT == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "✅ Instance OCI créée ($WHICH) — récupère l'IP" \
            --body "Une slot $WHICH s'est libérée dans eu-paris-1, l'instance est créée. Va dans la console OCI > Compute > Instances pour l'IP publique, puis connecte-toi : ssh -i ~/.ssh/main-vm ubuntu@IP_PUBLIQUE. Désactive ensuite ce workflow (onglet Actions > OCI capacity grabber > ... > Disable)."
