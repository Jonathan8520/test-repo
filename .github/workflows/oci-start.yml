name: OCI start (retry until capacity)

# Rallume une instance ARRÊTÉE en retentant tant qu'Oracle répond
# "Out of host capacity" (capacité Always Free rare à Paris).
#
# Contexte : après un stop/start de migration, amd-vm s'est retrouvée STOPPED
# et n'a pas pu redémarrer faute de capacité AMD libre. Ce workflow boucle sur
# l'action START jusqu'à décrocher un créneau, puis ouvre une issue (= mail).
#
# Manuel + planifié (toutes les 10 min) en filet de sécurité. À DÉSACTIVER une
# fois l'instance RUNNING (onglet Actions > ce workflow > ... > Disable).

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "OCID de l'instance à rallumer"
        required: true
        default: "ocid1.instance.oc1.eu-paris-1.anrwiljr4qgaapycfz6bk4rz5cpg7of7rlju6uzghyf2s3akxewp35pkmnqq"
  schedule:
    - cron: '*/10 * * * *'

permissions:
  issues: write

concurrency:
  group: oci-start
  cancel-in-progress: false

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      DEFAULT_ID:          "ocid1.instance.oc1.eu-paris-1.anrwiljr4qgaapycfz6bk4rz5cpg7of7rlju6uzghyf2s3akxewp35pkmnqq"
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Start avec retries sur "Out of host capacity"
        id: start
        run: |
          # ID depuis l'input manuel, sinon la valeur par défaut (runs planifiés).
          ID="${{ github.event.inputs.instance_id }}"
          [ -z "$ID" ] && ID="$DEFAULT_ID"
          echo "Instance : $ID"

          set +e
          STATE=$(oci compute instance get --instance-id "$ID" \
            --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
          echo "État initial : $STATE"
          if [ "$STATE" = "RUNNING" ]; then
            echo "Déjà RUNNING — rien à faire."
            echo "already=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ~40 tentatives espacées de 35 s (~23 min), en plus de l'attente
          # jusqu'à RUNNING quand l'action passe.
          for i in $(seq 1 40); do
            OUT=$(oci compute instance action --instance-id "$ID" \
              --action START --wait-for-state RUNNING --max-wait-seconds 120 2>&1)
            if [ $? -eq 0 ]; then
              echo "✅ Instance RUNNING (tentative $i)."
              echo "started=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if echo "$OUT" | grep -qi 'out of host capacity'; then
              echo "Tentative $i : pas de capacité, nouvel essai dans 35 s…"
              sleep 35
            else
              echo "Erreur non liée à la capacité :"
              echo "$OUT"
              exit 1
            fi
          done
          echo "Toujours pas de capacité après 40 tentatives."
          exit 1

      - name: Notifie (issue) quand l'instance repart
        if: steps.start.outputs.started == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "✅ amd-vm redémarrée (capacité retrouvée)" \
            --body "amd-vm est repassée en RUNNING après l'incident de capacité. Récupère l'IP publique (elle a pu changer) dans la console OCI > Compute > Instances, puis pense à DÉSACTIVER le workflow 'OCI start (retry until capacity)' pour arrêter les tentatives planifiées."
