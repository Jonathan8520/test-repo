name: OCI capacity grabber

# À chaque run (~toutes les 11 min), tente de COMPLÉTER le quota Always Free :
#   - une 2e VM AMD (E2.1.Micro, 1 OCPU / 1 Go)              -> "amd-vm-2"
#   - la prochaine tranche ARM (A1.Flex, 1 OCPU / 6 Go)      -> "arm-vm-1" .. "arm-vm-4"
#
# Stratégie "petites tranches" : 4 tranches de 1 OCPU/6 Go = 4 OCPU / 24 Go, soit
# EXACTEMENT le maximum gratuit ARM. Une petite tranche rentre bien plus souvent
# dans un trou de capacité qu'une grosse 4/24 -> on décroche plus vite.
#
# SÉCURITÉ : plafonné à 2 AMD + 4 ARM. Si le comptage échoue, on considère le
# quota "plein" et on ne crée rien -> aucun risque de dépassement / facturation.
# Ne fait QUE créer ce qui manque ; ne touche jamais aux instances existantes.
# (amd-vm, la 1re, est rallumée à part par oci-start.yml.)
#
# Ouvre une issue (= mail) à chaque création. À DÉSACTIVER quand le quota est plein.

on:
  schedule:
    - cron: '*/11 * * * *'
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: oci-grabber
  cancel-in-progress: false

jobs:
  grab:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      COMPARTMENT:         ${{ secrets.OCI_COMPARTMENT }}
      SUBNET:              ${{ secrets.OCI_SUBNET }}
      SSH_PUBKEY:          ${{ secrets.OCI_SSH_PUBKEY }}
      GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Compléter le quota (2e AMD + ARM par tranches de 1/6)
        run: |
          set +e
          AD=$(oci iam availability-domain list --query "data[0].name" --raw-output)
          echo "AD : $AD"

          # --- Compte l'existant (hors instances terminées) ---
          AMD_N=$(oci compute instance list -c "$COMPARTMENT" --all \
            --query "length(data[?\"shape\"=='VM.Standard.E2.1.Micro' && \"lifecycle-state\"!='TERMINATED' && \"lifecycle-state\"!='TERMINATING'])" \
            --raw-output 2>/dev/null)
          ARM_N=$(oci compute instance list -c "$COMPARTMENT" --all \
            --query "length(data[?\"shape\"=='VM.Standard.A1.Flex' && \"lifecycle-state\"!='TERMINATED' && \"lifecycle-state\"!='TERMINATING'])" \
            --raw-output 2>/dev/null)
          # Garde-fous anti-dépassement : si un comptage échoue, on plafonne.
          case "$AMD_N" in ''|*[!0-9]*) AMD_N=2 ;; esac
          case "$ARM_N" in ''|*[!0-9]*) ARM_N=4 ;; esac
          echo "État quota : AMD=$AMD_N/2  ARM=$ARM_N/4"

          if [ "$AMD_N" -ge 2 ] && [ "$ARM_N" -ge 4 ]; then
            echo "✅ Quota Always Free plein — rien à créer. (pense à désactiver ce workflow)"
            exit 0
          fi

          notify() {
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "✅ $1 créée sur OCI" \
              --body "Le grabber a créé **$1**. Récupère son IP publique dans la console OCI > Compute > Instances, puis connecte-toi : ssh -i ~/.ssh/main-vm ubuntu@IP_PUBLIQUE. Objectif de quota : 2 AMD + 4 ARM (1 OCPU/6 Go chacune). Désactive ce workflow quand tout est plein."
          }

          # --- 2e VM AMD ---
          if [ "$AMD_N" -lt 2 ]; then
            IMG=$(oci compute image list -c "$COMPARTMENT" \
              --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
              --shape "VM.Standard.E2.1.Micro" --sort-by TIMECREATED \
              --query "data[0].id" --raw-output)
            OUT=$(oci compute instance launch \
              --availability-domain "$AD" --compartment-id "$COMPARTMENT" \
              --shape "VM.Standard.E2.1.Micro" \
              --image-id "$IMG" --subnet-id "$SUBNET" --assign-public-ip true \
              --display-name "amd-vm-2" \
              --metadata "{\"ssh_authorized_keys\": \"$SSH_PUBKEY\"}" 2>&1)
            if echo "$OUT" | grep -q '"id"'; then
              echo "✅ amd-vm-2 créée"
              notify "amd-vm-2"
            else
              echo "AMD-2 -> $(echo "$OUT" | grep -oiE 'out of host capacity|toomanyrequests|limitexceeded' | head -1)"
            fi
          fi

          # --- Prochaine tranche ARM (1 OCPU / 6 Go) ---
          if [ "$ARM_N" -lt 4 ]; then
            NEXT=$((ARM_N + 1))
            IMG=$(oci compute image list -c "$COMPARTMENT" \
              --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
              --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED \
              --query "data[0].id" --raw-output)
            OUT=$(oci compute instance launch \
              --availability-domain "$AD" --compartment-id "$COMPARTMENT" \
              --shape "VM.Standard.A1.Flex" --shape-config '{"ocpus": 1, "memoryInGBs": 6}' \
              --image-id "$IMG" --subnet-id "$SUBNET" --assign-public-ip true \
              --display-name "arm-vm-$NEXT" \
              --metadata "{\"ssh_authorized_keys\": \"$SSH_PUBKEY\"}" 2>&1)
            if echo "$OUT" | grep -q '"id"'; then
              echo "✅ arm-vm-$NEXT créée (1 OCPU / 6 Go)"
              notify "arm-vm-$NEXT"
            else
              echo "ARM -> $(echo "$OUT" | grep -oiE 'out of host capacity|toomanyrequests|limitexceeded' | head -1)"
            fi
          fi
